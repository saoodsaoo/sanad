workflows:
  expo-android:
    name: Build Sanad Expo APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    triggering:
      events:
        - push
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Prebuild Expo to generate Android folder
        script: |
          npx expo prebuild --platform android
      - name: Configure Proguard and Split APK for smaller size
        script: |
          # هذا السطر يخبر الأندرويد بتفعيل التخسيس وضغط الكود لمنع الحجم الزائد
          sed -i 's/enableProguardInReleaseBuilds = false/enableProguardInReleaseBuilds = true/g' android/app/build.gradle
      - name: Build Android App (Release Build)
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
